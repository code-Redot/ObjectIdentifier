name: visual_recognition_app
description: Offline visual recognition app with on-device ML and camera integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Camera
  camera: ^0.10.5+5
  image_picker: ^1.0.5

  # ML & Image Processing
  # 0.11+ is required for NnApiDelegate / GpuDelegateV2 to be exported.
  tflite_flutter: ^0.11.0
  image: ^4.1.3
  google_mlkit_text_recognition: ^0.15.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  flutter_secure_storage: ^9.2.2

  # Utilities
  permission_handler: ^11.0.1
  uuid: ^4.2.1
  flutter_colorpicker: ^1.0.3
  vector_math: ^2.1.4

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/models/mobilenet_v3_large.tflite
